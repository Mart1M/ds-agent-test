name: Build Design Tokens

on:
  push:
    paths:
      - 'src/tokens/source/**'
      - 'src/tokens/build-config/**'
      - 'package.json'
  pull_request:
    paths:
      - 'src/tokens/source/**'
      - 'src/tokens/build-config/**'
      - 'package.json'

jobs:
  validate-and-build:
    name: Validate & Build Tokens
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate DTCG token schema
        run: npm run tokens:validate

      - name: Build design tokens
        run: npm run tokens:build

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain src/tokens/generated)" ]; then
            echo "❌ Generated token files are out of sync!"
            echo "Run 'npm run tokens:build' locally and commit the changes."
            git diff src/tokens/generated
            exit 1
          fi
          echo "✅ Generated tokens are up to date"
